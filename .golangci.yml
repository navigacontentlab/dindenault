version: "2"

linters:
    settings:
        funlen:
            lines: 120
            statements: 100
        godox:
            keywords:
                - FIXME
    disable:
        - wsl  # Deprecated in favor of wsl_v5, disabled for now
    enable:
        - bodyclose
        - copyloopvar
        - dogsled
        - dupl
        - errcheck
        - errorlint
        - exhaustive
        - forbidigo
        - funlen
        - gochecknoinits
        - gocognit
        - goconst
        - gocritic
        - godot
        - godox
        - goheader
        - gomoddirectives
        - gomodguard
        - goprintffuncname
        - gosec
        - govet
        - importas
        - ineffassign
        - ireturn
        - makezero
        - misspell
        - nakedret
        - nestif
        - nilnil
        - nlreturn
        - nolintlint
        - predeclared
        - promlinter
        - revive
        - rowserrcheck
        - staticcheck
        - testpackage
        - thelper
        - unconvert
        - unparam
        - unused
        - wastedassign
        - whitespace
        - wrapcheck

formatters:
    settings:
        gofmt:
            simplify: true
        goimports:
            local-prefixes:
                - github.com/navigacontentlab/dindenault
    enable:
        - gofmt
        - goimports
