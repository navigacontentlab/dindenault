name: Release

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to release (root or submodule name like otel)'
        required: true
        type: choice
        options:
          - root
          - otel
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Run tests
        run: |
          if [ "${{ inputs.module }}" = "root" ]; then
            go test -v ./...
          else
            cd ${{ inputs.module }}
            go test -v ./...
          fi

      - name: Create release tag
        run: make release MODULE=${{ inputs.module }} BUMP=${{ inputs.bump }}

      - name: Get new tag
        id: get_tag
        run: |
          if [ "${{ inputs.module }}" = "root" ]; then
            TAG=$(git describe --tags --abbrev=0)
          else
            TAG=$(git describe --tags --abbrev=0 --match "${{ inputs.module }}/v*")
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#*/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          release_name: Release ${{ steps.get_tag.outputs.tag }}
          body: |
            Release ${{ steps.get_tag.outputs.tag }}
            
            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: false
          prerelease: false
